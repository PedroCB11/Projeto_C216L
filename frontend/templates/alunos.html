<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Alunos Cadastrados</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    {% include 'navbar.html' %}
    {% include '_messages.html' %}
    <div class="container mt-5">
        <h2>Lista de Alunos</h2>
        {% if alunos %}
            <table class="table table-striped">
                <thead><tr><th>ID</th><th>Nome</th><th>Email</th><th>Curso</th><th>Ações</th></tr></thead>
                <tbody>
                {% for aluno in alunos %}
                    <tr>
                        <td>{{ aluno.id }}</td>
                        <td>{{ aluno.nome }}</td>
                        <td>{{ aluno.email }}</td>
                        <td>{{ aluno.curso }}</td>
                        <td>
                            <a href="{{ url_for('editar', aluno_id=aluno.id) }}" class="btn btn-sm btn-warning">Editar</a>
                            <a href="{{ url_for('excluir', aluno_id=aluno.id) }}" class="btn btn-sm btn-danger">Excluir</a>
                        </td>
                    </tr>
                {% endfor %}
                </tbody>
            </table>
        {% else %}
            <p>Nenhum aluno cadastrado ainda.</p>
        {% endif %}
    </div>
</body>
</html>
